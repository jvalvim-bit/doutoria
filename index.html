/* ─── HELPERS ─── */
function parseInline(text) {
  const parts = text.split(/(\*\*[^*]+\*\*|_[^_]+_)/g);
  return parts.map((p, i) => {
    if (p.startsWith("**") && p.endsWith("**")) return <strong key={i} style={T.strong}>{p.slice(2,-2)}</strong>;
    if (p.startsWith("_") && p.endsWith("_")) return <em key={i} style={{fontStyle:"italic",color:"#555"}}>{p.slice(1,-1)}</em>;
    return p;
  });
}

function RenderMessage({ text }) {
  if (!text) return <ThinkingDots/>;
  const lines = text.split("\n");
  const els = []; let k=0, i=0;
  while (i < lines.length) {
    const raw=lines[i], trim=raw.trim();
    if (!trim) { els.push(<div key={k++} style={{height:10}}/>); i++; continue; }
    if (/^[─═\-]{3,}$/.test(trim)) { els.push(<hr key={k++} style={T.hr}/>); i++; continue; }
    const hMatch = trim.match(/^\*\*(.+?)\*\*\s*$/);
    if (hMatch) { els.push(<p key={k++} style={T.heading}>{hMatch[1]}</p>); i++; continue; }
    const secMatch = trim.match(/^([IVXLCivxlc]+[\.\d]*|\d+[\.\d]*)\s*[—–-]\s*\*{0,2}(.+?)\*{0,2}$/);
    if (secMatch) { els.push(<p key={k++} style={T.secHeading}><span style={T.secNum}>{secMatch[1]}</span><span style={T.secTitle}>{secMatch[2].trim()}</span></p>); i++; continue; }
    if (/^[—\-•]\s/.test(trim)) {
      const items=[]; while(i<lines.length && /^[—\-•]\s/.test(lines[i].trim())) { items.push(lines[i].trim().replace(/^[—\-•]\s/,"")); i++; }
      els.push(<ul key={k++} style={T.ul}>{items.map((it,bi)=><li key={bi} style={T.li}>{parseInline(it)}</li>)}</ul>); continue;
    }
    if (/^[a-zA-Z][).]\s/.test(trim)) {
      const items=[]; while(i<lines.length && /^[a-zA-Z][).]\s/.test(lines[i].trim())) { items.push(lines[i].trim().replace(/^[a-zA-Z][).\s]+/,"")); i++; }
      els.push(<ol key={k++} style={T.ol}>{items.map((it,li)=><li key={li} style={T.li}>{parseInline(it)}</li>)}</ol>); continue;
    }
    if (/^\d+[).]\s/.test(trim)) {
      const items=[]; while(i<lines.length && /^\d+[).]\s/.test(lines[i].trim())) { items.push(lines[i].trim().replace(/^\d+[).]\s+/,"")); i++; }
      els.push(<ol key={k++} style={T.ol}>{items.map((it,li)=><li key={li} style={T.li}>{parseInline(it)}</li>)}</ol>); continue;
    }
    if (/^(Art\.|Súmula|Lei n|Decreto|Portaria|Resolução|CF\/|Código)/i.test(trim)) {
      els.push(<div key={k++} style={T.citationBlock}><span style={T.citationIcon}>§</span><p style={T.citationText}>{parseInline(trim)}</p></div>); i++; continue;
    }
    if (trim.startsWith('"') || trim.startsWith('\u201c')) {
      els.push(<blockquote key={k++} style={T.blockquote}>{parseInline(trim)}</blockquote>); i++; continue;
    }
    els.push(<p key={k++} style={T.para}>{parseInline(trim)}</p>); i++;
  }
  return <div style={T.body}>{els}</div>;
}

    const t4=setInterval(()=>setPulse(p=>!p),1200);
    return()=>{clearInterval(t1);clearInterval(t2);clearInterval(t3);clearInterval(t4);};

  return (

          return (
            <div key={i} style={{...ACK_S.step,opacity:future?(i===phase+1?0.4:0.18):1,transition:"opacity 0.6s ease"}}>
              <div style={{...ACK_S.dot,background:done?"#111":current?"#f0f0f0":"rgba(0,0,0,0.04)",transform:current&&pulse?"scale(1.15)":"scale(1)",transition:"all 0.5s ease",boxShadow:current?(pulse?"0 0 0 4px rgba(0,0,0,0.08)":"0 0 0 2px rgba(0,0,0,0.04)"):"none"}}>
                {done?<span style={{fontSize:9,color:"#fff",fontWeight:700}}>✓</span>:<span style={{fontSize:13}}>{p.icon}</span>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:12,fontWeight:current?600:400,color:done?"#aaa":current?"#111":"#ccc",textDecoration:done?"line-through":"none",transition:"all 0.4s ease"}}>
                  {p.text}{current&&<span style={{color:"#999",fontWeight:400}}>{dots}</span>}
                </div>
                {current&&<div style={ACK_S.detail}>{p.detail}</div>}
                {done&&<div style={ACK_S.doneTag}>concluído</div>}
              </div>
            </div>
          );
        })}
      </div>
      <div style={ACK_S.trackWrap}>
        <div style={ACK_S.track}>
          <div style={{...ACK_S.fill,width:`${pct}%`}}>
            <div style={{...ACK_S.fillShimmer,left:pulse?"110%":"-60%",transition:"left 1.2s ease"}}/>
          </div>
        </div>
        <div style={ACK_S.pctLabel}>{pct}%</div>
      </div>
      <div style={ACK_S.footer}>Análise fundamentada na legislação brasileira vigente</div>
    </div>
  );
}

function DocBadge({doc,onRemove}) {
  if (!doc) return null;
  return (
    <div style={DB.wrap}>
      <span style={DB.icon}>📄</span>
      <span style={DB.name}>{doc.name}</span>
      <span style={DB.size}>{Math.round(doc.text.length/100)/10}k chars</span>
      <button style={DB.remove} onClick={onRemove}>✕</button>
    </div>
  );
}

function AreaPanel({area:sel,onClose,onConsult}) {
  if (!sel) return null;
  const a=areas.find(x=>x.label===sel); if (!a) return null;
  return (
    <div style={AP.overlay} onClick={onClose}>
      <div style={AP.panel} className="fade-up" onClick={e=>e.stopPropagation()}>
        <button style={AP.closeBtn} onClick={onClose}>✕</button>
        <div style={AP.icon}>{a.icon}</div>
        <div style={AP.label}>{a.label}</div>
        <div style={AP.divider}/>
        <p style={AP.welcome}>Bem-vindo à área de <strong>{a.label}</strong>. O Dr. IA está pronto para orientá-lo com base na legislação brasileira vigente.</p>
        <p style={AP.desc}>{a.desc}</p>
        <button className="ap-cta" style={AP.cta} onClick={()=>{onConsult(a.label);onClose();}}>Fazer uma consulta nesta área →</button>
      </div>
    </div>
  );
}

/* ─── LOGO SVG ─── */

      <line x1="9" y1="16" x2="7" y2="30" stroke="#33333388" strokeWidth="1" strokeDasharray="2,1.5" className="logo-chain-l"/>
      <line x1="39" y1="16" x2="41" y2="26" stroke="#33333388" strokeWidth="1" strokeDasharray="2,1.5" className="logo-chain-r"/>
      <ellipse cx="7" cy="32" rx="7" ry="2.5" fill="none" stroke="#111" strokeWidth="1.2" className="logo-pan-l"/>
      <ellipse cx="41" cy="28" rx="7" ry="2.5" fill="none" stroke="#111" strokeWidth="1.2" className="logo-pan-r"/>

      <line x1="15" y1="53" x2="33" y2="53" stroke="#33333366" strokeWidth="1.5"/>

/* ─── MAIN APP ─── */
function App() {
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [busy,setBusy]=useState(false);
  const [area,setArea]=useState(null);
  const [panelArea,setPanelArea]=useState(null);
  const [contactOpen,setContactOpen]=useState(false);
  const [view,setView]=useState("home");
  const [questions,setQuestions]=useState(()=>pickQuestions());
  const [docFile,setDocFile]=useState(null);
  const [docLoading,setDocLoading]=useState(false);
  const fileInputRef=useRef(null);
  const bottomRef=useRef(null);
  const busyRef=useRef(false);
  const msgsRef=useRef([]);
  const areaRef=useRef(null);
  const docFileRef=useRef(null);

  useEffect(()=>{msgsRef.current=msgs;},[msgs]);
  useEffect(()=>{areaRef.current=area;},[area]);
  useEffect(()=>{docFileRef.current=docFile;},[docFile]);
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs]);

  const handleFile=useCallback(async(file)=>{
    if (!file) return;
    const ext=file.name.split(".").pop().toLowerCase();
    if (!["doc","docx"].includes(ext)) { alert("Apenas arquivos .doc e .docx são suportados."); return; }
    setDocLoading(true);
    try {
      const arrayBuffer=await file.arrayBuffer();
      const result=await mammoth.extractRawText({arrayBuffer});
      const text=result.value?.trim();
      if (!text) throw new Error("Documento vazio ou não legível.");
      setDocFile({name:file.name,text});
    } catch(e) { alert("Não foi possível ler o documento: "+e.message); }
    finally { setDocLoading(false); }
  },[]);

  const send=useCallback(async(textArg)=>{
    const currentDoc=docFileRef.current;
    const text=textArg?.trim()||(currentDoc?"Por favor, analise o documento anexado.":"");
    if (!text||busyRef.current) return;
    const userMsg={role:"user",content:text};
    const history=[...msgsRef.current,userMsg];
    busyRef.current=true; setBusy(true);
    setMsgs([...history,{role:"assistant",content:"__notice__"},{role:"assistant",content:"__ack__"}]);
    setInput(""); setView("chat");
    try {
      const ctx=areaRef.current?`\nÁrea: ${areaRef.current}`:"";
      const cleanHistory=history.filter(m=>m.content!=="__ack__"&&m.content!=="__notice__");
      const messagesWithDoc=cleanHistory.slice(-6).map((m,i,arr)=>{
        if (i===arr.length-1&&m.role==="user"&&currentDoc) {
          return {...m,content:`${m.content}\n\n---\n📄 DOCUMENTO ANEXADO: "${currentDoc.name}"\n\nCONTEÚDO DO DOCUMENTO:\n${currentDoc.text.slice(0,12000)}\n---`};
        }
        return m;
      });
      const payload={model:"claude-haiku-4-5-20251001",max_tokens:8000,system:SYSTEM_PROMPT+ctx,messages:messagesWithDoc};
      let res,data,attempts=0;
      while (attempts<3) {
        res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
        data=await res.json();
        if (res.status===529||data?.error?.type==="overloaded_error") {
          attempts++; if (attempts<3) await new Promise(r=>setTimeout(r,3000*attempts)); else throw new Error("overloaded");
        } else break;
      }
      if (!res.ok) throw new Error(data?.error?.message||`Erro ${res.status}`);
      const full=data.content?.map(b=>b.text||"").join("").trim();
      if (!full) throw new Error("Resposta vazia da API");
      setMsgs([...history,{role:"assistant",content:full}]);
      docFileRef.current=null; setDocFile(null);
    } catch(err) {
      const msg=err?.message?.includes("API key")
        ?"Chave de API inválida ou não autorizada."
        :err?.message?.includes("overloaded")
        ?"O servidor está sobrecarregado. Tente novamente em alguns segundos."
        :`Erro na conexão: ${err?.message||"tente novamente."}`;
      setMsgs(prev=>{const n=[...prev];n[n.length-1]={role:"assistant",content:msg};return n;});
    } finally { busyRef.current=false; setBusy(false); }
  },[]);

  const onKey=(e)=>{ if (e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);} };

  const reset=()=>{
    busyRef.current=false; msgsRef.current=[]; areaRef.current=null;
    setBusy(false); setMsgs([]); setInput(""); setArea(null); setView("home");
    setDocFile(null); setQuestions(pickQuestions());
  };

  const startAreaChat=(lbl)=>{
    areaRef.current=lbl; setArea(lbl); setMsgs([]); msgsRef.current=[];
    setPanelArea(null); setView("area-chat");
  };

  const areaInfo=areas.find(x=>x.label===area);

  return (
    <div style={S.root}>
      <div style={S.orb1}/><div style={S.orb2}/>

      {/* HEADER */}
      <header style={S.header}>
        <div style={S.hRow}>
          <div style={S.logo} onClick={reset}>
            <div style={S.logoIcon} className="logo-icon-wrap"><LogoSVG/></div>
            <div>
              <div style={S.brand}>Dr. IA</div>
              <div style={S.brandSub}>Consultoria Jurídica Digital</div>
            </div>
          </div>
          <button className="lawyer-btn" style={S.lawyerBtn} onClick={()=>setContactOpen(true)}>
            👨‍⚖️ Deseja um advogado?
          </button>
        </div>
      </header>

      {/* CONTACT MODAL */}
      {contactOpen&&(
        <div style={CM.overlay} onClick={()=>setContactOpen(false)}>
          <div style={CM.box} className="fade-up" onClick={e=>e.stopPropagation()}>
            <button style={CM.close} onClick={()=>setContactOpen(false)}>✕</button>
            <div style={CM.icon}>👨‍⚖️</div>
            <div style={CM.title}>Fale com um Advogado</div>
            <div style={CM.divider}/>
            <p style={CM.intro}>Quer uma assessoria jurídica personalizada? Entre em contato com nosso advogado parceiro:</p>
            <div style={CM.card}>
              <div style={CM.name}>Dr. José</div>
              <div style={CM.oab}>OAB/XX · Advogado</div>
              <div style={CM.separator}/>
              <p style={CM.msg}>Olá, Dr. José! Vim pelo site Dr. IA e gostaria de agendar uma consulta jurídica.</p>
              <a href="https://wa.me/55XXXXXXXXXXX?text=Ol%C3%A1%2C+Dr.+Jos%C3%A9!+Vim+pelo+site+Dr.+IA+e+gostaria+de+agendar+uma+consulta+jur%C3%ADdica." target="_blank" rel="noreferrer" style={CM.wBtn}>
                💬 Enviar mensagem via WhatsApp
              </a>
            </div>
            <p style={CM.disclaimer}>O atendimento com Dr. José é presencial ou por videoconferência, mediante agendamento.</p>
          </div>
        </div>
      )}

      <input ref={fileInputRef} type="file" accept=".doc,.docx" style={{display:"none"}}
        onChange={e=>{handleFile(e.target.files[0]);e.target.value="";}}/>

      <main style={S.main}>

        {/* ══ HOME ══ */}
        {view==="home"&&(
          <div className="fade-up">
            {/* HERO */}
            <div style={S.heroBanner} className="hero3d">
              <div style={S.heroGrid}/>
              <div style={S.heroSpotlight}/>
              <div style={S.orb3d1} className="orb-float-1"/>
              <div style={S.orb3d2} className="orb-float-2"/>
              <div style={S.heroInner}>
                <div style={S.heroLeft} className="eyebrow-slide">
                  <div style={S.heroTagStack}>
                    <span style={S.heroTag}>Legislação</span>
                    <span style={S.heroTag}>Jurisprudência</span>
                    <span style={S.heroTag}>Doutrina</span>
                  </div>
                  <p style={S.heroSideText}>Análise jurídica fundamentada na legislação brasileira vigente.</p>
                </div>
                <div style={S.heroCenter}>
                  <div style={S.heroCenterName} className="name-reveal">
                    <span style={S.heroNameLine1}>Dr.</span>
                    <span style={S.heroNameLine2}>IA</span>
                  </div>
                  <div style={S.heroEyebrow} className="cta-slide">⚖ CONSULTORIA JURÍDICA · INTELIGÊNCIA ARTIFICIAL</div>
                </div>
                <div style={S.heroRight} className="lead-slide">
                  <div style={S.heroStatStack}>
                    <div style={S.heroStat}><span style={S.heroStatNum}>CF/88</span><span style={S.heroStatLabel}>Constituição Federal</span></div>
                    <div style={S.heroStatDivider}/>
                    <div style={S.heroStat}><span style={S.heroStatNum}>25+</span><span style={S.heroStatLabel}>Áreas do Direito</span></div>
                    <div style={S.heroStatDivider}/>
                    <div style={S.heroStat}><span style={S.heroStatNum}>STJ</span><span style={S.heroStatLabel}>Jurisprudência</span></div>
                  </div>
                </div>
              </div>
              <div style={S.heroCta} className="cta-slide">
                <span style={S.heroCtaDot}/><span style={S.heroCtaText}>Role para baixo e faça sua consulta</span>
                <span style={S.heroCtaArrow} className="arrow-bounce">↓</span>
              </div>
            </div>

            {/* AREAS */}
            <div style={S.section}>
              <div style={S.secLabel}>Áreas de Atuação</div>
              <div style={S.aGrid}>
                {areas.map((a,idx)=>(
                  <button key={a.label} className={`area-card${area===a.label?" area-card-on":""}`}
                    onClick={()=>setPanelArea(a.label)}
                    style={{...S.aCard,animationDelay:`${idx*40}ms`}}>
                    <span style={S.aCardIcon}>{a.icon}</span>
                    <span style={S.aCardLabel}>{a.label}</span>
                    <span style={S.aCardArrow}>→</span>
                  </button>
                ))}
              </div>
            </div>

            <AreaPanel area={panelArea} onClose={()=>setPanelArea(null)} onConsult={startAreaChat}/>

            {/* QUESTIONS */}
            <div style={S.section}>
              <div style={S.secLabel}>Perguntas Frequentes</div>
              <div style={S.qGrid}>
                {questions.map(q=>(
                  <button key={q} className="quick-btn" style={S.qBtn} onClick={()=>send(q)}>
                    <span className="qarr" style={S.qarr}>›</span>{q}
                  </button>
                ))}
              </div>
            </div>

            {/* INPUT */}
            <div style={S.inputCard}>
              <DocBadge doc={docFile} onRemove={()=>setDocFile(null)}/>
              <textarea style={S.ta} rows={3} placeholder="Digite sua consulta jurídica…"
                value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey}/>
              <div style={S.taRow}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <button style={{...S.attachBtn,opacity:docLoading?0.5:1}}
                    onClick={()=>fileInputRef.current.click()} disabled={docLoading}>
                    {docLoading?"⏳":"📎"} {docLoading?"Lendo…":"Anexar .docx"}
                  </button>
                  <span style={S.hint}>Enter para enviar · Shift+Enter nova linha</span>
                </div>
                <button className="sbtn" style={{...S.sbtn,...(busy||(!input.trim()&&!docFile)?S.off:{})}}
                  onClick={()=>send(input)} disabled={busy||(!input.trim()&&!docFile)}>
                  Consultar →
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ══ CHAT ══ */}
        {(view==="chat"||view==="area-chat")&&(
          <div style={S.chatWrap}>
            <div style={S.chatBar}>
              <button className="back" style={S.back} onClick={reset}>← {view==="area-chat"?"Início":"Nova consulta"}</button>
              <div style={S.chatMeta}>
                {view==="area-chat"&&<span style={{fontSize:18,marginRight:6}}>{areaInfo?.icon}</span>}
                <em style={S.chatDr}>{view==="area-chat"?area:"Dr. IA"}</em>
                {view==="chat"&&area&&<span style={S.chatArea}>· {area}</span>}
              </div>
            </div>

            <div style={S.feed}>
              {view==="area-chat"&&msgs.length===0&&(
                <div className="fade-up" style={{...S.row,justifyContent:"flex-start"}}>
                  <div style={S.av}>Dr</div>
                  <div style={{...S.bubble,...S.bBot}}>
                    <div style={T.body}>
                      <p style={{...T.heading,marginTop:0}}>{areaInfo?.icon} {area}</p>
                      <p style={T.para}>Olá! Você está na área de <strong>{area}</strong>.</p>
                      <div style={{height:8}}/>
                      <p style={T.para}>{areaInfo?.desc}</p>
                      <div style={{height:8}}/>
                      <p style={T.para}>Sinta-se à vontade para fazer sua pergunta. Estou aqui para orientá-lo com base na legislação brasileira vigente.</p>
                    </div>
                  </div>
                </div>
              )}
              {msgs.map((m,i)=>(
                <div key={i} className="fade-up" style={{...S.row,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                  {m.role==="assistant"&&<div style={S.av}>Dr</div>}
                  <div style={{...S.bubble,...(m.role==="user"?S.bUser:S.bBot)}}>
                    {m.role==="user"
                      ?<span style={{fontFamily:"'Inter',sans-serif",fontSize:13}}>{m.content}</span>
                      :m.content==="__ack__"?<AckCard/>
                      :m.content==="__notice__"?<NoticeCard/>
                      :<RenderMessage text={m.content}/>
                    }
                  </div>
                </div>
              ))}
              <div ref={bottomRef}/>
            </div>

            <div style={S.cInput}>
              <div style={{width:"100%"}}>
                <DocBadge doc={docFile} onRemove={()=>setDocFile(null)}/>
                <div style={{display:"flex",alignItems:"flex-end",gap:8}}>
                  <button style={S.attachIconBtn} title="Anexar .docx"
                    onClick={()=>fileInputRef.current.click()} disabled={docLoading}>
                    {docLoading?"⏳":"📎"}
                  </button>
                  <textarea style={{...S.cTa,flex:1}} rows={2}
                    placeholder={view==="area-chat"?`Tire sua dúvida sobre ${area}…`:"Faça outra pergunta ao Dr. IA…"}
                    value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey}/>
                  <button className="sbtn" style={{...S.cSend,...(busy||(!input.trim()&&!docFile)?S.off:{})}}
                    onClick={()=>send(input)} disabled={busy||(!input.trim()&&!docFile)}>→</button>
                </div>
              </div>
            </div>
          </div>
        )}
      </main>

      <footer style={S.footer}>
        ⚠️ As orientações do Dr. IA têm caráter informativo e não substituem assessoria jurídica formal. Para casos específicos, consulte sempre um advogado.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
